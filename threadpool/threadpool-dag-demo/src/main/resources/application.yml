server:
  port: 8081

quotes:
  preview:
    max-concurrent: 128

threadpool:
  async:
    io:
      core-size: 8
      max-size: 32
      queue-type: LINKED_BLOCKING
      queue-capacity: 16
      keep-alive-seconds: 30
      rejection-policy: CALLER_RUNS
    cpu:
      core-size: 4
      max-size: 4
      queue-type: LINKED_BLOCKING
      queue-capacity: 32
      keep-alive-seconds: 30
      rejection-policy: ABORT
