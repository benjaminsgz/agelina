server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:threadpool_demo}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo&characterEncoding=utf8
    username: ${DB_USER:threadpool}
    password: ${DB_PASSWORD:threadpool}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 16
      minimum-idle: 16
      connection-timeout: 1000
      validation-timeout: 500
      idle-timeout: 60000

threadpool:
  async:
    io:
      core-size: 8
      max-size: 32
      queue-type: LINKED_BLOCKING
      queue-capacity: 32
      keep-alive-seconds: 30
      rejection-policy: CALLER_RUNS
    cpu:
      core-size: 4
      max-size: 4
      queue-type: LINKED_BLOCKING
      queue-capacity: 32
      keep-alive-seconds: 30
      rejection-policy: ABORT
