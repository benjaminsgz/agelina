server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:threadpool_demo}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo&characterEncoding=utf8
    username: ${DB_USER:threadpool}
    password: ${DB_PASSWORD:threadpool}
    driver-class-name: com.mysql.cj.jdbc.Driver

threadpool:
  async:
    io:
      core-size: 16
      max-size: 32
      queue-capacity: 2000
      keep-alive-seconds: 60
    cpu:
      core-size: 8
      max-size: 8
      queue-capacity: 500
      keep-alive-seconds: 60
